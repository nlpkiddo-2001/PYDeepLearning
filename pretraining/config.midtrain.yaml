# Mid-training Configuration
# Midtraining = Resume training from a checkpoint + change dataset mixture.
# This config resumes from a pretrain checkpoint and uses a mixed dataset.

stage: "midtrain"

wandb:
  enabled: true
  entity: "vipinsaravana"
  project: "H200 Pretrain"
  name: null

output_dir: "./checkpoints/midtrain"

# Resume from the latest pretrain checkpoint.
# Training state (optimizer, scheduler, step) will be preserved.
resume_from: "auto"

# --- Dataset Mixture Configuration ---
# Midtraining uses 80% General data + 20% Domain-specific data.
# Weights are relative; they will be normalized internally.
datasets:
  # General data (baseline, no specialization)
  - name: "C4"
    path: "./data/midtraining/c4"
    weight: 0.80

  # Domain-specific data (20% total, split among datasets below)
  - name: "Starcoder"
    path: "./data/midtraining/starcoder"
    weight: 0.04  # 20% / 5 domains = 4% each

  - name: "Math"
    path: "./data/midtraining/math"
    weight: 0.04

  - name: "FLAN"
    path: "./data/midtraining/flan"
    weight: 0.04

  - name: "KnowledgeQA"
    path: "./data/midtraining/knowledgeqa"
    weight: 0.04

  - name: "DCLM"
    path: "./data/midtraining/dclm"
    weight: 0.04

model:
  dim: 2048
  n_layers: 20
  n_heads: 32
  n_kv_heads: null
  multiple_of: 256
  ffn_dim_multiplier: null
  norm_eps: 1.0e-5
  dropout: 0.0

batch_size: 12
grad_accum: 8
max_steps: 110000
warmup_steps: 500
learning_rate: 3.0e-4
lr_min: 3.0e-5
context_window: 4096
save_every: 2000

use_muon: false

optimization:
  scheduler_type: "wsd"
  batch_size_schedule: null
  context_length_schedule: null
